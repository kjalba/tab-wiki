<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Tab Wiki - Explore</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">
    <h1>Tab Wiki</h1>
    <p class="dim" id="subtitle">Loading the Archive...</p>
    <div class="toolbar">
      <input type="text" id="filter" placeholder="Filter entries by title, URL, note, or topic..." />
      <button id="refresh">Refresh</button>
    </div>

    <details class="card engine-card" id="engineCard">
      <summary>Engine: <span id="engineSummary" class="dim">loading...</span></summary>
      <p class="dim" style="margin:10px 0 6px">Used by Reorganize and Refile (and the next Clean).</p>
      <div class="engine-row-wrap">
        <div id="engines" class="engine-list"></div>
        <div class="model-row"><label for="model">Model</label><select id="model"></select></div>
      </div>
    </details>

    <div class="toolbar">
      <button id="reorganize" class="primary" title="Tell the Engine how to regroup existing entries">Reorganize entries...</button>
    </div>
    <div id="topics"></div>
  </div>
  <script src="explore.js"></script>
</body>
</html>
