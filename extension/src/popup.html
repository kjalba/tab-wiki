<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="popup">
    <h1>Tab Wiki</h1>
    <div id="status" class="dim">Connecting to Companion...</div>

    <button id="clean" class="primary big" disabled>Clean all tabs</button>
    <button id="explore" class="big">Explore the wiki</button>

    <label class="check">
      <input type="checkbox" id="exclude" />
      <span>Exclude this tab (invisible to Clean)</span>
    </label>

    <div class="field">
      <label>Engine</label>
      <div id="engines" class="engine-list"></div>
    </div>
    <div class="row">
      <label for="model">Model</label>
      <select id="model"></select>
    </div>
    <div id="message" class="dim"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
